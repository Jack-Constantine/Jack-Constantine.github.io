<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f5f8;
      --bg-soft: rgba(255, 255, 255, 0.62);
      --panel: #ffffff;
      --panel-2: #f7f9fc;
      --text: #111827;
      --muted: #667085;
      --border: #d6deea;
      --accent: #2b6cb0;
      --accent-soft: rgba(43, 108, 176, 0.12);
      --code-bg: #0f172a;
      --code-text: #e2e8f0;
      --quote-bg: #edf4fb;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
    }

    body[data-theme="dark"] {
      --bg: #0b1120;
      --bg-soft: rgba(15, 23, 42, 0.74);
      --panel: #111827;
      --panel-2: #0f172a;
      --text: #e5edf8;
      --muted: #94a3b8;
      --border: #263246;
      --accent: #63b3ed;
      --accent-soft: rgba(99, 179, 237, 0.16);
      --code-bg: #020617;
      --code-text: #dbe7f5;
      --quote-bg: #172334;
      --shadow: 0 22px 48px rgba(2, 6, 23, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(43, 108, 176, 0.12), transparent 24%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.08), transparent 18%),
        linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 88%, #000 12%) 100%);
      transition: background 180ms ease, color 180ms ease;
    }

    .utility-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 14px 18px 0;
    }

    .utility-group {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg-soft);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .page {
      width: min(1600px, calc(100vw - 28px));
      margin: 14px auto 28px;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .sidebar,
    .content-shell {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--bg-soft);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .sidebar {
      position: sticky;
      top: 72px;
      padding: 18px 16px;
      max-height: calc(100vh - 92px);
      overflow: auto;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-head strong {
      font-size: 15px;
      letter-spacing: 0.02em;
    }

    .status {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .toc {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .toc a {
      display: block;
      padding: 8px 10px;
      border-radius: 10px;
      color: var(--muted);
      text-decoration: none;
      line-height: 1.45;
      transition: background 140ms ease, color 140ms ease, transform 140ms ease;
    }

    .toc a:hover {
      background: var(--accent-soft);
      color: var(--text);
      transform: translateX(2px);
    }

    .toc a.level-1 {
      font-weight: 700;
      color: var(--text);
    }

    .toc a.level-2 {
      padding-left: 18px;
    }

    .toc a.level-3 {
      padding-left: 30px;
      font-size: 14px;
    }

    .toc a.active {
      color: var(--text);
      background: var(--accent-soft);
      box-shadow: inset 2px 0 0 var(--accent);
    }

    .content-shell {
      min-width: 0;
      padding: 26px 34px 40px;
    }

    .content-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .content-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .content-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    .button-like {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    button:hover,
    .button-like:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    button.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .button-like {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #file-input {
      display: none;
    }

    .notice {
      display: none;
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #d8b36e;
      background: rgba(255, 240, 208, 0.92);
      color: #6d4700;
      line-height: 1.55;
    }

    body[data-theme="dark"] .notice {
      background: rgba(89, 55, 7, 0.42);
      color: #ffd694;
      border-color: #8a6320;
    }

    .notice.show {
      display: block;
    }

    .markdown-body {
      width: min(100%, 1080px);
      margin: 0 auto;
      font-size: 17px;
      line-height: 1.8;
      word-break: break-word;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      margin: 1.7em 0 0.72em;
      line-height: 1.25;
      scroll-margin-top: 88px;
    }

    .markdown-body h1 {
      margin-top: 0;
      font-size: 42px;
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--border);
    }

    .markdown-body h2 {
      font-size: 30px;
      padding-bottom: 0.22em;
      border-bottom: 1px solid color-mix(in srgb, var(--border) 75%, transparent 25%);
    }

    .markdown-body h3 {
      font-size: 24px;
    }

    .markdown-body p,
    .markdown-body ul,
    .markdown-body ol,
    .markdown-body blockquote,
    .markdown-body pre,
    .markdown-body table,
    .markdown-body hr {
      margin: 0 0 1.15em;
    }

    .markdown-body ul,
    .markdown-body ol {
      padding-left: 1.55em;
    }

    .markdown-body li + li {
      margin-top: 0.28em;
    }

    .markdown-body a {
      color: var(--accent);
      text-decoration: none;
    }

    .markdown-body a:hover {
      text-decoration: underline;
    }

    .markdown-body code {
      font-family: Consolas, "SFMono-Regular", Monaco, monospace;
      font-size: 0.92em;
      padding: 0.16em 0.42em;
      border-radius: 6px;
      background: color-mix(in srgb, var(--panel-2) 90%, var(--accent-soft) 10%);
    }

    .markdown-body pre {
      overflow: auto;
      padding: 18px;
      border-radius: 16px;
      background: var(--code-bg);
      color: var(--code-text);
    }

    .markdown-body pre code {
      padding: 0;
      background: transparent;
      color: inherit;
    }

    .markdown-body blockquote {
      padding: 14px 18px;
      border-left: 4px solid var(--accent);
      border-radius: 0 14px 14px 0;
      background: var(--quote-bg);
      color: var(--muted);
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: color-mix(in srgb, var(--panel) 92%, transparent 8%);
    }

    .markdown-body th,
    .markdown-body td {
      padding: 11px 13px;
      border: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    .markdown-body th {
      background: color-mix(in srgb, var(--panel-2) 94%, transparent 6%);
      font-weight: 700;
    }

    .markdown-body hr {
      border: 0;
      border-top: 1px solid var(--border);
    }

    .empty-state {
      padding: 64px 18px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 1080px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        max-height: none;
      }

      .markdown-body {
        width: 100%;
      }
    }

    @media (max-width: 720px) {
      .utility-bar {
        justify-content: stretch;
        padding: 10px 10px 0;
      }

      .utility-group {
        width: 100%;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .page {
        width: min(100vw - 14px, 1600px);
        gap: 14px;
      }

      .content-shell {
        padding: 18px 16px 28px;
      }

      .content-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .markdown-body {
        font-size: 16px;
      }

      .markdown-body h1 {
        font-size: 32px;
      }

      .markdown-body h2 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="utility-bar">
    <div class="utility-group">
      <button type="button" id="theme-system">系统</button>
      <button type="button" id="theme-light">浅色</button>
      <button type="button" id="theme-dark">深色</button>
    </div>
  </div>

  <main class="page">
    <aside class="sidebar">
      <div class="sidebar-head">
        <strong>目录</strong>
        <div class="status" id="status">准备读取文档</div>
      </div>
      <nav class="toc" id="toc">
        <div class="empty-state">目录将在文档加载后显示。</div>
      </nav>
    </aside>

    <section class="content-shell">
      <div class="content-head">
        <p>默认直接读取 <code>./enterprise_agent_runtime_prd.md</code></p>
        <div class="content-actions">
          <button type="button" id="reload-btn">重新加载</button>
          <label class="button-like" for="file-input">打开其他 Markdown</label>
          <input id="file-input" type="file" accept=".md,.markdown,text/markdown">
        </div>
      </div>

      <section class="notice" id="notice"></section>

      <article class="markdown-body" id="markdown-output">
        <div class="empty-state">正在尝试读取文档...</div>
      </article>
    </section>
  </main>

  <script>
    const DEFAULT_PATH = "./markdown/enterprise_agent_runtime_tech_learning.md";
    const THEME_STORAGE_KEY = "viewer-theme-preference";

    const output = document.getElementById("markdown-output");
    const toc = document.getElementById("toc");
    const statusText = document.getElementById("status");
    const notice = document.getElementById("notice");
    const reloadButton = document.getElementById("reload-btn");
    const fileInput = document.getElementById("file-input");
    const themeSystemButton = document.getElementById("theme-system");
    const themeLightButton = document.getElementById("theme-light");
    const themeDarkButton = document.getElementById("theme-dark");
    let activeTocId = "";
    let tocSyncScheduled = false;
    const systemThemeQuery = typeof matchMedia === "function"
      ? matchMedia("(prefers-color-scheme: dark)")
      : { matches: false, addEventListener() {} };

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function slugify(text) {
      const slug = text
        .toLowerCase()
        .trim()
        .replace(/[^\w\u4e00-\u9fa5\s-]/g, "")
        .replace(/[\s_-]+/g, "-")
        .replace(/^-+|-+$/g, "");
      return slug || "section";
    }

    function resolveInitialTheme(preference, systemDark) {
      if (preference === "light" || preference === "dark") {
        return preference;
      }
      return systemDark ? "dark" : "light";
    }

    function extractHeadings(markdown) {
      const headings = [];
      const seen = new Map();
      const lines = markdown.replace(/\r\n?/g, "\n").split("\n");

      for (const line of lines) {
        const match = line.match(/^(#{1,3})\s+(.+)$/);
        if (!match) {
          continue;
        }

        const level = match[1].length;
        const text = match[2].trim();
        const baseId = slugify(text);
        const count = seen.get(baseId) || 0;
        seen.set(baseId, count + 1);
        headings.push({
          level,
          text,
          id: count === 0 ? baseId : `${baseId}-${count + 1}`
        });
      }

      return headings;
    }

    function parseInline(text) {
      const codeTokens = [];
      let value = escapeHtml(text).replace(/`([^`]+)`/g, (_, code) => {
        const token = `__CODE_TOKEN_${codeTokens.length}__`;
        codeTokens.push(`<code>${code}</code>`);
        return token;
      });

      value = value
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, href) => {
          return `<a href="${href}" target="_blank" rel="noreferrer">${label}</a>`;
        })
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\*([^*]+)\*/g, "<em>$1</em>");

      return value.replace(/__CODE_TOKEN_(\d+)__/g, (_, index) => codeTokens[Number(index)]);
    }

    function splitTableRow(line) {
      return line
        .trim()
        .replace(/^\|/, "")
        .replace(/\|$/, "")
        .split("|")
        .map((cell) => parseInline(cell.trim()));
    }

    function isTableSeparator(line) {
      return /^\s*\|?(?:\s*:?-{3,}:?\s*\|)+\s*:?-{3,}:?\s*\|?\s*$/.test(line);
    }

    function isTableRow(line) {
      return /^\s*\|.*\|\s*$/.test(line);
    }

    function renderTable(lines) {
      const headerCells = splitTableRow(lines[0]);
      const bodyLines = lines.slice(2);
      const header = `<thead><tr>${headerCells.map((cell) => `<th>${cell}</th>`).join("")}</tr></thead>`;
      const body = bodyLines.length
        ? `<tbody>${bodyLines.map((line) => {
            const cells = splitTableRow(line);
            return `<tr>${cells.map((cell) => `<td>${cell}</td>`).join("")}</tr>`;
          }).join("")}</tbody>`
        : "";
      return `<table>${header}${body}</table>`;
    }

    function renderCodeBlock(language, code) {
      const className = language ? ` class="language-${escapeHtml(language)}"` : "";
      return `<pre><code${className}>${escapeHtml(code)}</code></pre>`;
    }

    function applyTheme(theme) {
      document.body.dataset.theme = theme;
    }

    function setActiveState(element, active) {
      if (!element || !element.classList) {
        return;
      }

      if (active) {
        element.classList.add("active");
      } else {
        element.classList.remove("active");
      }
    }

    function updateThemeButtons(preference) {
      const mode = preference || "system";
      setActiveState(themeSystemButton, mode === "system");
      setActiveState(themeLightButton, mode === "light");
      setActiveState(themeDarkButton, mode === "dark");
    }

    function setThemePreference(preference) {
      if (!preference || preference === "system") {
        localStorage.removeItem(THEME_STORAGE_KEY);
        applyTheme(resolveInitialTheme(null, systemThemeQuery.matches));
        updateThemeButtons("system");
        return;
      }

      localStorage.setItem(THEME_STORAGE_KEY, preference);
      applyTheme(resolveInitialTheme(preference, systemThemeQuery.matches));
      updateThemeButtons(preference);
    }

    function initializeTheme() {
      const stored = localStorage.getItem(THEME_STORAGE_KEY);
      applyTheme(resolveInitialTheme(stored, systemThemeQuery.matches));
      updateThemeButtons(stored || "system");
    }

    function renderToc(headings) {
      if (!headings.length) {
        toc.innerHTML = '<div class="empty-state">当前文档没有可用目录。</div>';
        return;
      }

      toc.innerHTML = headings
        .map((heading) => `<a class="level-${heading.level}" href="#${heading.id}">${escapeHtml(heading.text)}</a>`)
        .join("");
    }

    function findActiveHeadingId(headingPositions, scrollY, offset = 150) {
      if (!headingPositions.length) {
        return null;
      }

      const threshold = scrollY + offset;
      let activeId = headingPositions[0].id;

      for (const heading of headingPositions) {
        if (heading.top <= threshold) {
          activeId = heading.id;
        } else {
          break;
        }
      }

      return activeId;
    }

    function updateActiveTocLink(id) {
      if (!id || activeTocId === id || !toc.querySelectorAll) {
        return;
      }

      const links = Array.from(toc.querySelectorAll("a"));
      let activeLink = null;

      for (const link of links) {
        const isActive = link.getAttribute("href") === `#${id}`;
        setActiveState(link, isActive);
        if (isActive) {
          activeLink = link;
        }
      }

      activeTocId = id;

      if (activeLink && typeof activeLink.scrollIntoView === "function") {
        activeLink.scrollIntoView({ block: "nearest" });
      }
    }

    function getScrollTop() {
      if (typeof window.scrollY === "number") {
        return window.scrollY;
      }

      return document.documentElement && typeof document.documentElement.scrollTop === "number"
        ? document.documentElement.scrollTop
        : 0;
    }

    function syncActiveTocLink() {
      if (!output.querySelectorAll) {
        return;
      }

      const headings = Array.from(output.querySelectorAll("h1[id], h2[id], h3[id]"));
      const scrollTop = getScrollTop();
      const positions = headings.map((heading) => ({
        id: heading.id,
        top: scrollTop + (typeof heading.getBoundingClientRect === "function"
          ? heading.getBoundingClientRect().top
          : 0)
      }));
      const activeId = findActiveHeadingId(positions, scrollTop, 150);

      updateActiveTocLink(activeId);
    }

    function scheduleTocSync() {
      if (tocSyncScheduled) {
        return;
      }

      tocSyncScheduled = true;
      const runner = () => {
        tocSyncScheduled = false;
        syncActiveTocLink();
      };

      if (typeof requestAnimationFrame === "function") {
        requestAnimationFrame(runner);
      } else {
        runner();
      }
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n?/g, "\n").split("\n");
      const headingQueue = [...extractHeadings(markdown)];
      let html = "";
      let paragraph = [];
      let listType = null;
      let listItems = [];
      let inCodeBlock = false;
      let codeLanguage = "";
      let codeLines = [];

      function flushParagraph() {
        if (!paragraph.length) {
          return;
        }
        html += `<p>${parseInline(paragraph.join(" "))}</p>`;
        paragraph = [];
      }

      function flushList() {
        if (!listItems.length || !listType) {
          return;
        }
        const tag = listType === "ol" ? "ol" : "ul";
        html += `<${tag}>${listItems.map((item) => `<li>${parseInline(item)}</li>`).join("")}</${tag}>`;
        listItems = [];
        listType = null;
      }

      function flushOpenBlocks() {
        flushParagraph();
        flushList();
      }

      for (let index = 0; index < lines.length; index += 1) {
        const line = lines[index];

        if (inCodeBlock) {
          if (/^```/.test(line.trim())) {
            html += renderCodeBlock(codeLanguage, codeLines.join("\n"));
            inCodeBlock = false;
            codeLanguage = "";
            codeLines = [];
          } else {
            codeLines.push(line);
          }
          continue;
        }

        const fenceMatch = line.trim().match(/^```([\w-]+)?/);
        if (fenceMatch) {
          flushOpenBlocks();
          inCodeBlock = true;
          codeLanguage = fenceMatch[1] || "";
          continue;
        }

        if (!line.trim()) {
          flushOpenBlocks();
          continue;
        }

        if (/^\s*---+\s*$/.test(line)) {
          flushOpenBlocks();
          html += "<hr>";
          continue;
        }

        if (isTableRow(line) && index + 1 < lines.length && isTableSeparator(lines[index + 1])) {
          flushOpenBlocks();
          const tableLines = [line, lines[index + 1]];
          index += 2;
          while (index < lines.length && isTableRow(lines[index])) {
            tableLines.push(lines[index]);
            index += 1;
          }
          index -= 1;
          html += renderTable(tableLines);
          continue;
        }

        const headingMatch = line.match(/^(#{1,6})\s+(.+)$/);
        if (headingMatch) {
          flushOpenBlocks();
          const level = headingMatch[1].length;
          const text = headingMatch[2].trim();
          const nextHeading = level <= 3 && headingQueue.length ? headingQueue.shift() : null;
          const id = nextHeading && nextHeading.text === text ? nextHeading.id : slugify(text);
          html += `<h${level} id="${id}">${parseInline(text)}</h${level}>`;
          continue;
        }

        const blockquoteMatch = line.match(/^\s*>\s?(.*)$/);
        if (blockquoteMatch) {
          flushOpenBlocks();
          const quoteLines = [blockquoteMatch[1]];
          while (index + 1 < lines.length) {
            const nextLine = lines[index + 1];
            const nextQuote = nextLine.match(/^\s*>\s?(.*)$/);
            if (!nextQuote) {
              break;
            }
            quoteLines.push(nextQuote[1]);
            index += 1;
          }
          html += `<blockquote><p>${parseInline(quoteLines.join(" "))}</p></blockquote>`;
          continue;
        }

        const orderedMatch = line.match(/^\s*\d+\.\s+(.+)$/);
        if (orderedMatch) {
          flushParagraph();
          if (listType && listType !== "ol") {
            flushList();
          }
          listType = "ol";
          listItems.push(orderedMatch[1].trim());
          continue;
        }

        const unorderedMatch = line.match(/^\s*[-*+]\s+(.+)$/);
        if (unorderedMatch) {
          flushParagraph();
          if (listType && listType !== "ul") {
            flushList();
          }
          listType = "ul";
          listItems.push(unorderedMatch[1].trim());
          continue;
        }

        flushList();
        paragraph.push(line.trim());
      }

      if (inCodeBlock) {
        html += renderCodeBlock(codeLanguage, codeLines.join("\n"));
      }

      flushOpenBlocks();
      output.innerHTML = html || '<div class="empty-state">文档内容为空。</div>';
      renderToc(extractHeadings(markdown));
      activeTocId = "";
      scheduleTocSync();

      const firstHeading = extractHeadings(markdown)[0];
      document.title = firstHeading ? firstHeading.text : "Markdown Viewer";
    }

    function updateStatus(message) {
      statusText.textContent = message;
    }

    function showNotice(message) {
      notice.textContent = message;
      notice.classList.add("show");
    }

    function clearNotice() {
      notice.textContent = "";
      notice.classList.remove("show");
    }

    async function loadMarkdown(path = DEFAULT_PATH) {
      updateStatus(`正在读取 ${path}`);
      clearNotice();

      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const markdown = await response.text();
        renderMarkdown(markdown);
        updateStatus(`已加载 ${path}`);
      } catch (error) {
        output.innerHTML = '<div class="empty-state">自动读取失败，请改用“打开其他 Markdown”手动选择文件。</div>';
        toc.innerHTML = '<div class="empty-state">文档未加载，暂时没有目录。</div>';
        updateStatus("读取失败");
        showNotice("如果你是直接双击本地 HTML 打开的，浏览器可能会阻止 file:// 页面读取本地 Markdown。可以继续用“打开其他 Markdown”手动选择文件，或者在当前目录启动本地 HTTP 服务后再打开这个页面。");
        console.error(error);
      }
    }

    themeSystemButton.addEventListener("click", () => {
      setThemePreference("system");
    });

    themeLightButton.addEventListener("click", () => {
      setThemePreference("light");
    });

    themeDarkButton.addEventListener("click", () => {
      setThemePreference("dark");
    });

    reloadButton.addEventListener("click", () => {
      loadMarkdown(DEFAULT_PATH);
    });

    fileInput.addEventListener("change", () => {
      const [file] = fileInput.files || [];
      if (!file) {
        return;
      }

      clearNotice();
      updateStatus(`正在读取 ${file.name}`);
      const reader = new FileReader();

      reader.onload = () => {
        renderMarkdown(String(reader.result || ""));
        updateStatus(`已加载 ${file.name}`);
      };

      reader.onerror = () => {
        updateStatus("手动读取失败");
        showNotice("文件读取失败，请重新选择 Markdown 文件。");
      };

      reader.readAsText(file, "utf-8");
    });

    toc.addEventListener("click", (event) => {
      const target = event.target;
      if (!target || typeof target.closest !== "function") {
        return;
      }

      const link = target.closest("a");
      if (!link) {
        return;
      }

      const href = link.getAttribute("href") || "";
      if (href.startsWith("#")) {
        updateActiveTocLink(href.slice(1));
      }
    });

    if (typeof systemThemeQuery.addEventListener === "function") {
      systemThemeQuery.addEventListener("change", (event) => {
        if (!localStorage.getItem(THEME_STORAGE_KEY)) {
          applyTheme(resolveInitialTheme(null, event.matches));
          updateThemeButtons("system");
        }
      });
    }

    if (typeof window.addEventListener === "function") {
      window.addEventListener("scroll", scheduleTocSync, { passive: true });
      window.addEventListener("resize", scheduleTocSync);
      window.addEventListener("hashchange", scheduleTocSync);
    }

    initializeTheme();
    loadMarkdown(DEFAULT_PATH);

    window.__viewerTestHooks = {
      resolveInitialTheme,
      extractHeadings,
      findActiveHeadingId
    };
  </script>
</body>
</html>
